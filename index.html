<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SNS 정부지원사업 최종 보고서 인사이트 생성기</title>
<style>
  :root{--bg:#FAFAF9;--panel:#fff;--ink:#1A1A1A;--muted:#6A6A6A;--faint:#9A9A9A;--line:#E2E2DF;--focus:#2C6E9B;
        --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;}
  *{box-sizing:border-box}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);margin:0;line-height:1.65}
  .container{max-width:1040px;margin:0 auto;padding:0 22px 48px}
  header{padding:22px 0 16px;border-bottom:1px solid var(--line);margin-bottom:24px}
  header h1{font-size:17px;margin:0}
  header .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
  .layout{display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:start}
  @media (max-width:800px){.layout{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px}
  .card h2{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin:0;padding:14px 18px;border-bottom:1px solid var(--line)}
  .body{padding:18px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
  .field label .opt{font-weight:500;color:var(--faint)}
  .hint{font-size:12px;color:var(--muted);margin-top:5px}
  textarea,select,input[type=url],input[type=file]{width:100%;font-family:var(--sans);font-size:13.5px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:6px;padding:10px 11px}
  input[type=file]{padding:8px 11px;cursor:pointer}
  select{appearance:none;cursor:pointer}
  select:invalid{color:var(--faint)}
  textarea:focus,select:focus,input:focus,.gen:focus-visible{outline:2px solid var(--focus);outline-offset:1px}
  .gen{width:100%;margin-top:6px;font-size:14px;font-weight:600;color:#fff;background:var(--ink);border:none;border-radius:6px;padding:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .gen[disabled]{background:#C5C5C2;cursor:not-allowed}
  .spin{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .rhead{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--line)}
  .rhead h2{border:0;padding:0}
  .copy{font-size:12px;border:1px solid var(--line);border-radius:5px;padding:6px 12px;cursor:pointer;background:#fff}
  .empty{padding:52px 26px;text-align:center;color:var(--faint);font-size:13.5px}
  .out{white-space:pre-wrap;font-size:13.5px;color:#242424;padding:20px 22px}
  .err{color:#B23;font-size:13px;padding:16px 22px;white-space:pre-wrap}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>SNS 정부지원사업 최종 보고서 인사이트 생성기</h1>
    <div class="sub">보고서 링크·카톡 CSV·조건을 넣으면 4·5번 인사이트·제언을 작성합니다. 결과를 복사해 보고서에 붙여넣으세요.</div>
  </header>

  <div class="layout">
    <section class="card">
      <h2>입력</h2>
      <div class="body">
        <div class="field">
          <label for="drive">최종 보고서 <span class="opt">· 구글 문서 링크</span></label>
          <input id="drive" type="url" placeholder="https://docs.google.com/document/d/.../edit">
          <div class="hint">Ad Agent → 최종 보고서 생성 → 생성된 최종 보고서 열기 → 링크 복사&amp;붙여넣기</div>
        </div>
        <div class="field">
          <label for="csv">광고주 카톡 CSV</label>
          <input id="csv" type="file" accept=".csv">
          <div class="hint">대화방 → 우측상단 햄버거 메뉴 → 대화 내보내기 → 저장 후 선택</div>
        </div>
        <div class="field">
          <label for="level">광고주 숙련도</label>
          <select id="level" required>
            <option value="" disabled selected>선택하세요</option>
            <option>초심자</option>
            <option>경험자</option>
          </select>
        </div>
        <div class="field">
          <label for="landing">랜딩페이지</label>
          <select id="landing" required>
            <option value="" disabled selected>선택하세요</option>
            <option>입점몰·플랫폼 (스마트스토어·오늘의집·무신사·29CM 등)</option>
            <option>자사몰 (직접 도메인)</option>
          </select>
        </div>
        <button class="gen" id="gen" disabled>인사이트 생성</button>
        <div class="hint" style="text-align:center;margin-top:8px">네 항목을 모두 입력하면 버튼이 활성화됩니다.</div>
      </div>
    </section>

    <section class="card">
      <div class="rhead"><h2>결과 · 4·5번</h2><span id="copybtns" style="display:none"><button class="copy" id="copy4">4번 복사</button> <button class="copy" id="copy5" style="margin-left:6px">5번 복사</button></span></div>
      <div class="empty" id="empty">왼쪽에 보고서 링크·카톡 CSV를 넣고 <b>인사이트 생성</b>을 누르세요.</div>
      <div class="out" id="out" style="display:none"></div>
      <div class="err" id="err" style="display:none"></div>
    </section>
  </div>
</div>

<script>
  var gen=document.getElementById('gen'),empty=document.getElementById('empty'),out=document.getElementById('out'),
      err=document.getElementById('err'),copybtns=document.getElementById('copybtns'),copy4=document.getElementById('copy4'),copy5=document.getElementById('copy5'),
      drive=document.getElementById('drive'),csv=document.getElementById('csv'),
      level=document.getElementById('level'),landing=document.getElementById('landing');

  function allFilled(){
    return !!(drive.value.trim() && csv.files.length>0 && level.value && landing.value);
  }
  function refresh(){ gen.disabled = !allFilled(); }
  drive.addEventListener('input',refresh);
  csv.addEventListener('change',refresh);
  level.addEventListener('change',refresh);
  landing.addEventListener('change',refresh);
  refresh();

  gen.addEventListener('click',async function(){
    if(!allFilled()) return; // 하나라도 비면 생성 불가
    if(!/\/document\/d\//.test(drive.value.trim())){alert('올바른 구글 문서 링크가 아닙니다.\n예: https://docs.google.com/document/d/.../edit');return;}
    gen.disabled=true;gen.innerHTML='<span class="spin"></span> 생성 중…';
    empty.style.display='none';out.style.display='none';err.style.display='none';
    try{
      var csvText=await csv.files[0].text();
      var res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({drive:drive.value.trim(),csv:csvText,level:level.value,landing:landing.value})});
      var data=await res.json();
      if(!res.ok){throw new Error(data.error||'생성 실패');}
      out.textContent=data.text;out.style.display='block';copybtns.style.display='inline-block';
    }catch(e){err.textContent='오류: '+e.message;err.style.display='block';}
    gen.textContent='다시 생성';refresh();
  });
  function splitParts(){
    var t=out.textContent||'';
    var i=t.indexOf('5. 향후 제언');
    var p4=(i>=0?t.slice(0,i):t).replace(/^\s*4\.\s*인사이트\s*\n+/,'').trim();
    var p5=(i>=0?t.slice(i):'').replace(/^\s*5\.\s*향후\s*제언\s*\n+/,'').trim();
    return {p4:p4,p5:p5};
  }
  function doCopy(btn,text,label){
    if(!text){alert('복사할 내용이 없습니다.');return;}
    navigator.clipboard&&navigator.clipboard.writeText(text);
    btn.textContent='복사됨 ✓';setTimeout(function(){btn.textContent=label;},1500);
  }
  copy4.addEventListener('click',function(){doCopy(copy4,splitParts().p4,'4번 복사');});
  copy5.addEventListener('click',function(){doCopy(copy5,splitParts().p5,'5번 복사');});
</script>
</body>
</html>
